<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<title>Issues Tracker</title>

<script src="https://cdn.tailwindcss.com"></script>

<link rel="stylesheet" href="css/style.css">

</head>

<body class="bg-gray-100">

<nav class="bg-white shadow p-4 flex justify-between">

<h1 class="text-xl font-bold">
Issues Tracker
</h1>

<div>

<input id="searchInput"
class="border p-2 rounded"
placeholder="Search issues">

<button onclick="searchIssues()"
class="bg-blue-600 text-white px-4 py-2 rounded">

Search

</button>

</div>

</nav>

<section class="p-6">

<div class="flex gap-3 mb-6">

<button onclick="filterIssues('all')" class="tabBtn activeTab">
All
</button>

<button onclick="filterIssues('open')" class="tabBtn">
Open
</button>

<button onclick="filterIssues('closed')" class="tabBtn">
Closed
</button>

</div>
<div id="loader" class="text-center hidden">
Loading Issues...
</div>

<div id="issuesContainer"
class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
</div>

</section>

<!-- MODAL -->

<div id="modal"
class="fixed inset-0 bg-black bg-opacity-40 hidden items-center justify-center">

<div class="bg-white p-6 rounded w-96">

<h2 id="modalTitle" class="text-xl font-bold mb-2"></h2>

<p id="modalDesc"></p>

<p id="modalMeta"
class="text-sm text-gray-600 mt-2"></p>

<button onclick="closeModal()"
class="mt-4 bg-red-500 text-white px-4 py-2 rounded">

Close

</button>

</div>

</div>

<script src="api.js"></script>
<script src="ui.js"></script>
<script src="app.js"></script>

</body>
</html>
